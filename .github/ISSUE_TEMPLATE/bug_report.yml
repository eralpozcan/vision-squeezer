name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Commands or code to reproduce the issue
      placeholder: |
        cargo run -- data/image.jpg
        # or MCP call...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual Output / Error
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: vision-squeezer version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: "rustc 1.78.0"
